# ── Analysis parameters (ASSUMED DEFAULTS — replace with author values if known) ──
# scRNA-seq QC thresholds
qc:
  mito_threshold_pct: 20         # ASSUMED: standard threshold; paper states "mitochondrial fraction < 20%"
  ribo_threshold_pct: 50         # ASSUMED: standard threshold
  min_umi: 500                   # ASSUMED: standard minimum; inferred from methods
  tomato_min_count: 1            # ASSUMED: "tdTomato-positive" = ≥1 count

# Seurat integration
integration:
  nfeatures: 2000                # From code
  dims_full: 30                  # From code
  dims_mesenchymal: 20           # From code (fewer dims after filtering)
  resolution_full: 0.6           # From code
  resolution_mesenchymal: 0.2    # From code
  k_weight_controls: 50          # PATCHED: was 80, but anchor count <68
  k_weight_tumors: 25            # From code (original; anchor count not exceeded)
  k_weight_combined: 50          # From code

# Trajectory
trajectory:
  monocle_min_branch_len: 15     # From code
  root_selection: "nearest_progen_centroid"  # ASSUMED: nearest UMAP principal node to Progen centroid

# Pathway analysis
pathway:
  progeny_top: 500               # From code
  organism: "mouse"              # From code

# Bulk RNA-seq
bulk_rna:
  design_formula: "~ Genotype"   # From code (DESeq2 design)
  contrast: ["Genotype", "KO", "WT"]  # From code
  msigdb_species: "Mus musculus"  # Corrected from DB_SPECIES="MM" (msigdbr 7.5.1 API change)
